      - snippets/roi_inputs.md
      - snippets/roi_summary.md
    estimation:
      role: summary
      section: '3'
    sdd:
      role: board summary
      section: '9'
      template: snippets/roi_summary.md
    arch-review:
      role: board-facing aggregate
      section: '7'
