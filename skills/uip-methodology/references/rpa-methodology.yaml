      type: list
      items:
        name:
          type: string
        properties:
          type: list
          items:
            name:
              type: string
            type:
              type: string
- name: platform_overview
  description: 'High-level UiPath platform fields written in SDD section 2.2 as a flipped table. Detailed spec lives in the
    "TO-BE platform" topic model; these are the document-level summary rows that a reader sees first.

