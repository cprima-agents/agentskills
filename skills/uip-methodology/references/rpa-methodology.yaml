- topic: Credentials / security
  semantics:
    kind: constraint
  purpose:
    statement: Ensure every system authentication is documented with auth method, asset type, and rotation policy so the
      robot is secure and maintainable.
    review: 'For each system the robot authenticates to, the documentation must specify: (1) authentication method — username/password,
      public/private key pair (e.g. SFTP, SSH), API key, OAuth/SSO via Entra ID, or certificate; (2) storage — which Orchestrator
      Asset type: Credential (username + password) or Text (private key, API key, token, URL); wrong type is a defect; (3)
      retention and rotation — credential or key lifetime and what the robot does when a credential expires, a key is rotated,
      or a token is revoked. The robot account itself must be identified as a named Entra ID user (e.g. cg371p), not described
      generically. Rate ''good'' if all three dimensions are documented for every system, Orchestrator Asset types are correct,
      and rotation handling is defined. Rate ''medium'' if systems and auth methods are named but rotation/retention is TBD.
      Rate ''low'' if any system''s auth method is undocumented, an Asset type is wrong, credentials are hardcoded, or the
      robot account is not a named Entra ID user.

      '
  acquisition:
