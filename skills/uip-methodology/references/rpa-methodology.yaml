- topic: Build effort breakdown
  semantics:
    kind: metric
  purpose:
    statement: Estimate build effort per component so the project can be costed, staffed, and tracked against a 
      baseline.
  acquisition:
    modes:
    - estimate
    - interview
    estimate:
      instruction: 'SA assigns effort per component from SDD section 3.4. For each: catalog flag, base_effort_pds, multipliers
        (kind + value), confidence, contingency override, and role split. Global pd_rate and contingency_pct set once at the
        top.

        '
    interview:
      question: For each component in the inventory, estimate the effort in person-days — accounting for archetype type,
        catalog availability, exception count, and surface complexity.
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: estimation
  concept:
    uses:
    - components
    model:
      pd_rate:
        type: number
        required: true
        description: Cost per person-day (project currency)
      contingency_pct:
        type: number
        required: true
        description: Global contingency applied to total base effort
      effort_items:
        type: list
        required: true
        item:
          id:
            type: string
            required: false
            description: Stable trace ID — auto-assigned by parser (est_xxxxxx). Manual override allowed.
          component_id:
            type: string
          catalog:
            type: boolean
            description: true = standard REFramework catalog effort (‡); false = bespoke (†)
          complexity:
            type: string
            enum:
            - low
            - medium
            - high
            - critical
            description: Structural complexity — independent of multiplier math; used for reporting, governance, and 
              historical calibration
          base_effort_pds:
            type: number
          multipliers:
            type: list
            item:
              kind:
                type: string
                enum:
                - complexity
                - reuse
                - observability
                - selector_stability
                - integration
              value:
                type: number
          derived_effort_pds:
            type: number
            derived: base_effort_pds * product(multipliers[*].value)
          confidence:
            type: string
            enum:
            - high
            - medium
            - low
            - very_low
          contingency_pct:
            type: number
            description: Per-component override; falls back to global contingency_pct when absent
          roles:
            type: list
            description: Approximate role allocation; sum(effort_pds) should equal derived_effort_pds
            item:
              role:
                type: string
                enum:
                - sa
                - developer
                - ba
                - pm
                - ops
              effort_pds:
                type: number
      total_base_pds:
        type: number
        derived: sum(effort_items[*].derived_effort_pds)
      total_effort_pds:
        type: number
        derived: total_base_pds * (1 + contingency_pct / 100)
      build_cost:
        type: number
        derived: total_effort_pds * pd_rate
  artefacts:
    estimation:
      owns: true
      section: '1'
      required: true
      template:
      - snippets/effort_items.md
      - snippets/estimation_summary.md
    sdd:
      role: reference
      section: '9'
      template: snippets/estimation_summary.md
    project_plan:
      role: milestone basis
    arch-review:
      role: cost envelope only
      section: '6.1'
      template: snippets/estimation_summary.md
