# RPA Methodology — artefacts, topics, and data model
#
# Topic axes:
#   semantics.kind              = intent | concept | artefact | role | constraint | decision | metric | procedure | gate
#   purpose.statement           = intent expressed in rendered documents
#   purpose.review              = LLM review rubric with quality tiers (optional)
#   acquisition.modes           = list of acquisition modes (e.g. interview)
#   acquisition.interview.question = elicitation prompt for interview mode
#   concept.model               = data model fields (used by generator and parser)
#   concept.uses                = cross-topic field dependencies (informational)
#   transforms.to_markdown      = Python script that renders topic regions to markdown
#   transforms.from_markdown    = Python script that parses markdown regions back to data
#   artefacts.<id>              = per-artefact presence; owns/required/role/section
#   artefacts.<id>.template     = Jinja2 snippet file(s) rendering this topic's region
#   role.R/A/C/I                = RACI; R is required (stakeholder who owns the content)
#   enums.<name>                = id+label pairs; inline enum: lists reference these ids
#
# Absent artefact key           = topic is not present in that artefact

meta:
  id_strategy: stable_hash    # sha256(prefix + canonical_parts)[:6]
  id_version: 1               # increment if hash inputs or prefix mapping changes

artefacts:
- id: pdd
  label: PDD
  file_glob: '*pdd*.md'
  client_facing: true
  lifecycle: true
- id: sdd
  label: SDD
  file_glob: '*sdd*.md'
  client_facing: true
  lifecycle: true
- id: arch-review
  label: Architecture Chapter
  file_glob: '*arch*.md'
  # sections: ordered derivable regions — section numbers live in the topic artefact entry.
  # Owned regions (owns:true in topic) are SA-authored scaffold; they do not appear here.
  sections:
  - region: solution_overview
    topic: Process name / ownership
    source: pdd
  - region: business_objectives
    topic: Business objectives
    source: pdd
  - region: system_context
    topic: System context
    source: sdd
  - region: containers
    topic: Container architecture
    source: sdd
  - region: adr_inventory
    topic: Architecture decision records
    source: sdd
  - region: estimation_summary
    topic: Build effort breakdown
    source: estimation
  - region: roi_summary
    topic: ROI and payback
    source: roi
- id: estimation
  label: Estimation
  file_glob: '*estimation*.md'
  client_facing: true
  lifecycle: true
- id: roi
  label: ROI Calculation
  file_glob: '*roi*.md'
- id: tdd
  label: TDD
  file_glob: '*tdd*.md'
- id: adr
  label: ADR
  file_glob: docs/adr/adr-*.md
  lifecycle: true
  collection: true
- id: glossary
  label: Glossary
  file_glob: '*glossary*.md'
- id: project_plan
  label: Project Plan
  file_glob: '*project-plan*.md'
topics:
- topic: Process name / ownership
  semantics:
    kind: concept
  purpose:
    statement: Establish the official identity of the process and its accountability chain before any design work 
      begins.
  acquisition:
    modes:
    - interview
    interview:
      question: What is the official name of this process, and who owns it — process owner, department, and responsible 
        architect?
  concept:
    model:
      process_name:
        type: string
      process_owner:
        type: string
      department:
        type: string
      responsible_architect:
        type: string
      solution_overview:
        type: string
        required: false
        description: One sentence — what the automation does, which systems it connects, key business outcome. 
          SA-written for arch_review.
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: pdd
  artefacts:
    pdd:
      owns: true
      required: true
      template: snippets/process_overview.md
      validated_by:
    sdd:
      role: reference
    arch-review:
      role: identity header
      section: '1'
      template: snippets/process_overview.md
  role:
    R: process-owner
    A: sa
  validated_by:
- topic: Business objectives
  semantics:
    kind: intent
  purpose:
    statement: Capture the measurable business outcomes expected from automation so the project team can assess delivery
      success.
  acquisition:
    modes:
    - interview
    interview:
      question: What business outcomes do you expect after automation — time saved, error reduction, cost savings, SLA 
        improvement, compliance, or other goals? List them as bullet points.
  concept:
    model:
      objectives:
        type: list
        item:
          type: string
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: pdd
  artefacts:
    pdd:
      owns: true
      required: true
      section: '1.1'
      template: snippets/objectives.md
      validated_by:
    sdd:
      role: reference
      section: '1.1'
      template: snippets/objectives.md
    arch-review:
      role: success criteria
      section: '2.4'
      required: true
      template: snippets/objectives.md
  role:
    R: process-owner
    A: sa
    C:
    - pm
  validated_by:
- topic: Prerequisites for automation
  semantics:
    kind: gate
  purpose:
    statement: List the conditions that must be met before the build can start, so blockers are visible and owned from 
      the first day of the project.
  acquisition:
    modes:
    - interview
    - default
    interview:
      question: Are there any project-specific prerequisites beyond the standard checklist — e.g. custom compliance 
        approvals, additional access gates, or third-party sign-offs? If so, list them.
    default:
      static:
      - criterion: Completed and signed-off PDD
        status: open
      - criterion: Works Council (Betriebsrat) Mitbestimmung approval obtained
        status: open
      - criterion: Data Protection Officer (Datenschutzbeauftragter) approval obtained — DPIA completed if personal data
          is processed
        status: open
      - criterion: Test data set covering all exception scenarios
        status: open
      - criterion: Credentials stored in Orchestrator Assets (no hardcoding)
        status: open
      - criterion: Dependencies with other projects documented
        status: open
      derived:
      - source: applications
        filter:
          in_scope: true
          category: application
        template: Robot user account has dev/test access to {name}
        status: open
  concept:
    model:
      prerequisites:
        type: list
        item:
          criterion:
            type: string
          status:
            type: string
            enum: gate_status
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: pdd
  artefacts:
    pdd:
      owns: true
      required: true
      section: '1.3'
      template: snippets/prerequisites.md
      validated_by:
  role:
    R: pm
    A: sa
    C:
    - process-owner
  validated_by:
- topic: Contact persons
  semantics:
    kind: role
  purpose:
    statement: Record all key contacts so every team member knows who to reach for business decisions, approvals, system
      access, and compliance.
  acquisition:
    modes:
    - interview
    interview:
      question: 'Who are the key contacts? For the PDD: process owner, business sponsor, BA, PM, Works Council rep, and DPO.
        For the SDD: per-system technical contacts — who to call for firewall rules, account provisioning, and system access
        requests.'
  concept:
    model:
      contacts_business:
        type: list
        item:
          name:
            type: string
          role:
            type: string
            enum:
            - process-owner
            - sponsor
            - ba
            - pm
            - works-council
            - dpo
            - other
          email:
            type: string
          org_unit:
            type: string
            required: false
          notes:
            type: string
            required: false
      contacts_technical:
        type: list
        item:
          name:
            type: string
          role:
            type: string
          system:
            type: string
          email:
            type: string
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: pdd
  artefacts:
    pdd:
      owns: true
      role: business + delivery contacts
      required: true
      template: snippets/contacts_business.md
      validated_by:
    sdd:
      owns: true
      role: technical system contacts
      required: true
      template: snippets/contacts_technical.md
      validated_by:
  role:
    R: ba
    A: pm
  validated_by:
- topic: AS-IS process steps
  semantics:
    kind: procedure
  purpose:
    statement: Map every manual step — including branches, exceptions, and system touch-points — so the automation scope
      is unambiguous and nothing is missed.
  acquisition:
    modes:
    - interview
    interview:
      question: Walk me through every manual step in the current process from trigger to completion — systems touched, 
        actions taken, and who performs each step.
  concept:
    model:
      process_steps:
        type: list
        item:
          id:
            type: string
            required: false
            description: Stable trace ID — auto-assigned by parser (act_xxxxxx). Manual override allowed.
          step:
            type: string
          input:
            type: string
          description:
            type: string
          next_step:
            type: string
            required: false
          on_exception:
            type: string
            required: false
          pipeline_stage:
            type: string
            required: false
            enum:
            - init
            - ingest
            - enrich
            - decide
            - execute
            - complete
            - finalize
          business_rule:
            type: string
            required: false
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: pdd
  artefacts:
    pdd:
      owns: true
      required: true
      template: snippets/process_steps.md
      validated_by:
  role:
    R: ba
    A: process-owner
    C:
    - sa
  validated_by:
- topic: TO-BE process map
  semantics:
    kind: intent
  purpose:
    statement: Define which steps the robot will own and which remain manual, creating the agreed boundary the build 
      team designs to.
  acquisition:
    modes:
    - interview
    interview:
      question: Which steps will the robot perform, and which remain manual? Describe the automated flow end to end.
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: pdd
  artefacts:
    pdd:
      owns: true
      required: true
  role:
    R: ba
    A: sa
    C:
    - process-owner
  validated_by:
- topic: Volume / peak / frequency
  semantics:
    kind: metric
  purpose:
    statement: Quantify throughput, peak load, and timing so the architecture is sized correctly and SLAs can be set.
  acquisition:
    modes:
    - interview
    interview:
      question: How many items arrive daily, monthly, and at peak? Are there known quiet periods, seasonal patterns, or 
        processing windows?
  concept:
    model:
      schedule:
        type: string
      daily_volume:
        type: integer
      monthly_volume:
        type: integer
      aht_min:    # average handling time per item (minutes)
        type: number
      peak_period:
        type: string
      peak_volume:
        type: integer
      quiet_periods:
        type: string
        required: false
      expected_volume_growth:
        type: string
        required: false
      items_per_runtime_per_day:
        type: number
        required: false
        derived: processing_window_min / aht_min
        description: Throughput capacity of one runtime within the processing window
      business_problem:
        type: string
        required: false
        description: SA-authored narrative for arch_review section 2.1 — current manual effort, pain points, volume 
          context.
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: pdd
  artefacts:
    pdd:
      owns: true
      required: true
      template: snippets/volume.md
      validated_by:
    estimation:
      role: informs hours
      required: true
    sdd:
      role: reference
      required: true
    project_plan:
      role: informs timeline
    arch-review:
      role: informs feasibility
  role:
    R: process-owner
    A: ba
    C:
    - sa
  validated_by:
- topic: AS-IS applications
  semantics:
    kind: concept
  purpose:
    statement: Catalogue every application and platform component the robot must interact with to drive access planning 
      and selector strategy.
  acquisition:
    modes:
    - interview
    interview:
      question: 'List every application the current manual process touches — name, version, automation surface (ui / api /
        database / file / email / queue), and access method. For each business application, state whether it has been automated
        before in any project. Also list all UiPath platform components in use (Robot, Orchestrator, etc.) with category:
        platform.'
  concept:
    model:
      applications:
        type: list
        item:
          name:
            type: string
          category:
            type: string
            enum:
            - application
            - platform
          version:
            type: string
            required: false
          automation_surface:
            type: string
            enum:
            - ui
            - api
            - database
            - file
            - email
            - queue
            - platform
          access_method:
            type: string
          in_scope:
            type: boolean
          previously_automated:    # N/A for category: platform
            type: boolean
            required: false
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: pdd
  artefacts:
    pdd:
      owns: true
      required: true
      template: snippets/applications.md
      validated_by:
    estimation:
      role: informs rates
    sdd:
      role: reference
      section: '5'
    arch-review:
      role: technology matrix
      required: true
  role:
    R: ba
    A: sa
    C:
    - developer
  validated_by:
- topic: System access prerequisites
  semantics:
    kind: constraint
  purpose:
    statement: Identify every access gate — approvals, accounts, firewall rules — that must be cleared before the robot 
      can run, so blockers surface early.
  acquisition:
    modes:
    - interview
    interview:
      question: For each system the robot connects to, what must be arranged before the robot can run — system owner 
        approval, account provisioning, firewall rules, static IP whitelisting, and any other access gating steps? Who 
        owns each action and by when?
  concept:
    model:
      system_prerequisites:
        type: list
        item:
          system:
            type: string
          prerequisite:
            type: string
          detail:
            type: string
          owner:
            type: string
          status:
            type: string
            enum:
            - Open
            - In Progress
            - Done
          gate:
            type: string
            enum:
            - Pre-Dev
            - Pre-UAT
            - Pre-Go-Live
            required: false
      robot_account:
        type: string
        required: false
        description: Dedicated automation identity (Entra ID / AD service account)
      privilege_level:
        type: string
        required: false
        description: Local admin / standard user / domain user
      mfa_session_policy:
        type: string
        required: false
      access_control:
        type: list
        description: Robot account access control summary; computed from technology_overview infrastructure + robot-type
          components and system_prerequisites robot-account rows
        derived: infer(technology_overview[infrastructure,automation]) + filter(system_prerequisites where system='Robot
          Account')
        item:
          item_label:
            type: string
            description: e.g. Robot account, Privilege level, MFA / session policy
          value:
            type: string
    uses:
    - technology_overview
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: sdd
  artefacts:
    sdd:
      owns: true
      required: true
      template: snippets/system_prerequisites.md
      validated_by:
  role:
    R: sa
    A: pm
    C:
    - developer
  validated_by:
- topic: TO-BE platform (RPA infrastructure)
  semantics:
    kind: concept
  purpose:
    statement: Capture the selected UiPath platform configuration required for Works Council review and infrastructure 
      provisioning. Rationale and alternatives belong in ADRs.
  acquisition:
    modes:
    - interview
    interview:
      question: Which UiPath runtime components are required — robot type (unattended/attended), Orchestrator type 
        (Cloud/Suite), execution mode (XAML/Coded/Hybrid), and scalability requirements? State selected values only; 
        document the why in docs/adr/.
  concept:
    model:
      technology_overview:
        type: list
        description: UiPath platform layers and components in use — one row per component from uipath_platform_layers 
          enum
        item:
          layer:
            type: string
          component:
            type: string
          used:
            type: string
            description: "'\\u2713' = in use, '—' = not used"
      uipath_version:
        type: string
      execution_mode:
        type: string
        enum:
        - XAML
        - Coded C#
        - Hybrid
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: sdd
  artefacts:
    pdd:
      owns: true
      role: high-level for Mitbestimmung
      required: true
    sdd:
      owns: true
      role: full technical spec — tenant, account, queue, VM
      section: '2.2'
      required: true
      template:
      - snippets/technology_overview.md
      - snippets/technology_config.md
      validated_by:
    arch-review:
      owns: true
      role: platform configuration — selected values
      section: '3'
      required: true
      template: snippets/technology_overview.md
  role:
    R: sa
    A: sponsor
  validated_by:
- topic: In scope / out of scope
  semantics:
    kind: constraint
  purpose:
    statement: Draw an explicit boundary around what this release automates so all parties share the same expectation 
      and change requests are traceable.
  acquisition:
    modes:
    - interview
    interview:
      question: Which process steps are in scope for this automation release, and which are explicitly excluded? State 
        the boundary clearly.
  concept:
    model:
      in_scope:
        type: list
        item:
          step:
            type: string
          description:
            type: string
      out_of_scope:
        type: list
        item:
          activity:
            type: string
          reason:
            type: string
          impact_on_to_be:
            type: string
            required: false
          future_automation_path:
            type: string
            required: false
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: pdd
  artefacts:
    pdd:
      owns: true
      required: true
      section: '3.3'
      template:
      - snippets/in_scope.md
      - snippets/out_of_scope.md
      validated_by:
    sdd:
      role: reference
      template:
      - snippets/in_scope.md
      - snippets/out_of_scope.md
    arch-review:
      owns: true
      role: scope boundary decision
      section: '2.3'
      required: true
      template:
      - snippets/in_scope.md
      - snippets/out_of_scope.md
  role:
    R: sa
    A: process-owner
    C:
    - sponsor
  validated_by:
- topic: Constraints and assumptions
  semantics:
    kind: constraint
  purpose:
    statement: Document technical constraints and design assumptions that bound the solution so developers know what 
      they cannot change and what they are taking for granted.
  acquisition:
    modes:
    - interview
    interview:
      question: What technical constraints apply — network, access, performance? What design assumptions are you making 
        about data quality, volume stability, or downstream systems?
  concept:
    model:
      constraints:
        type: list
        item:
          type:
            type: string
            enum:
            - Constraint
            - Assumption
            - Decision
          statement:
            type: string
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: sdd
  artefacts:
    sdd:
      owns: true
      required: true
      section: '1.3'
      template: snippets/constraints.md
  role:
    R: sa
    A: pm
- topic: Parallel initiatives
  semantics:
    kind: constraint
  purpose:
    statement: Identify concurrent projects that share steps, systems, or data with this automation so impacts can be 
      tracked and scope conflicts avoided.
  acquisition:
    modes:
    - interview
    interview:
      question: Are there any other projects, system upgrades, or process changes running in parallel that share steps, 
        applications, or data with this automation?
  concept:
    model:
      parallel_initiatives:
        type: list
        item:
          initiative:
            type: string
          affected_steps:
            type: string
          impact_on_automation:
            type: string
          expected_completion:
            type: string
          contact:
            type: string
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: pdd
  artefacts:
    pdd:
      owns: true
      section: '3.2'
      template: snippets/parallel_initiatives.md
      validated_by:
    sdd:
      role: reference
  role:
    R: pm
    A: sa
    C:
    - ba
  validated_by:
- topic: Business exceptions
  semantics:
    kind: concept
  purpose:
    statement: Enumerate the data conditions that make a transaction unprocessable so the robot handles them gracefully 
      rather than crashing or silently skipping.
  acquisition:
    modes:
    - interview
    - default
    interview:
      question: What data conditions make a transaction invalid or unprocessable — and what should the robot do in each 
        case?
    default:
      static:
      - Send email to `[TBD — exceptions@company.com]` with screenshot attached
      - Log the transaction as "Business Exception" in Orchestrator
      - Move to the next transaction
  concept:
    model:
      business_exceptions:
        type: list
        item:
          name:
            type: string
          step:
            type: string
          trigger:
            type: string
          robot_action:
            type: string
      default_be_handling:
        type: list
        item:
          type: string
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: pdd
  artefacts:
    pdd:
      owns: true
      required: true
      template:
      - snippets/business_exceptions.md
      - snippets/default_be_handling.md
      validated_by:
    estimation:
      role: contingency
    sdd:
      role: reference
      section: '6'
      required: true
    arch-review:
      role: flags gaps
  role:
    R: process-owner
    A: ba
    C:
    - sa
  validated_by:
- topic: System exceptions
  semantics:
    kind: concept
  purpose:
    statement: Capture known application failures and define the robot's recovery behaviour so production incidents stay
      within expected bounds.
  acquisition:
    modes:
    - interview
    - default
    interview:
      question: What application errors, login failures, timeouts, or infrastructure faults has this process 
        experienced? How should the robot respond to each?
    default:
      static:
      - 'Retry the current step up to `[DEFAULT: 3]` times'
      - 'If unresolved: log the error, send alert to `[TBD — ops@company.com]`, terminate cleanly'
  concept:
    model:
      application_errors:
        type: list
        item:
          name:
            type: string
          step:
            type: string
          trigger:
            type: string
          robot_action:
            type: string
      exception_handling:
        type: list
        item:
          exception_type:
            type: string
          trigger:
            type: string
          robot_action:
            type: string
          max_retries:
            type: integer
          escalation:
            type: string
      default_se_handling:
        type: list
        item:
          type: string
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: sdd
  artefacts:
    pdd:
      role: preliminary known errors
      template:
      - snippets/application_errors.md
      - snippets/default_se_handling.md
      validated_by:
    sdd:
      owns: true
      section: '6'
      required: true
      template:
      - snippets/application_errors.md
      - snippets/default_se_handling.md
      - snippets/exception_handling.md
      validated_by:
  role:
    R: sa
    C:
    - developer
  validated_by:
- topic: Reporting requirements
  semantics:
    kind: constraint
  purpose:
    statement: Define the monitoring and reporting outputs the business and operations teams need to trust and maintain 
      the robot in production.
  acquisition:
    modes:
    - interview
    - default
    interview:
      question: What does the business need to monitor — frequency, granularity, and tooling? What does the ops team 
