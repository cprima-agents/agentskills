- topic: ROI and payback
  semantics:
    kind: metric
  purpose:
    statement: Translate volume, AHT savings, and run costs into a financial case that justifies the investment to 
      sponsors and leadership.
  acquisition:
    modes:
    - interview
    interview:
      question: What is the FTE cost rate basis, monthly labour saving, net saving, payback period, and year-1/year-3 
        net benefit?
  concept:
    uses:
    - monthly_volume
    - monthly_run_cost
    - build_cost
    model:
      fte_cost_rate:    # €/hour
        type: number
        required: true
      aht_saved_min:   # minutes saved per item
        type: number
        required: true
      fte_hours_saved_month:
        type: number
        derived: monthly_volume * aht_saved_min / 60
      monthly_labour_saving:
        type: number
        derived: fte_hours_saved_month * fte_cost_rate
      monthly_net_saving:
        type: number
        derived: monthly_labour_saving - monthly_run_cost
      annual_net_saving:
        type: number
        derived: monthly_net_saving * 12
      payback_months:
        type: number
        derived: build_cost / monthly_net_saving
      year_1_net_benefit:
        type: number
        derived: annual_net_saving - build_cost
      year_3_net_benefit:
        type: number
        derived: (annual_net_saving * 3) - build_cost
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: roi
  artefacts:
    roi:
      owns: true
      required: true
