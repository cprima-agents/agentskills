# -----------------------------------------------------------------------------
# Project management model — entity shapes for project-blueprint.yaml.
# A blueprint instantiates these shapes into a concrete delivery plan.
# Separation: build effort (tasks) is distinct from run costs (recurring).
# Gate criteria live on milestones only — tasks carry predecessors only.
# -----------------------------------------------------------------------------
  uipath_platform_layers:
  - id: discovery
    label: Discovery
    components:
    - id: process_mining_discovery
      label: Process Mining
    - id: task_mining
      label: Task Mining
    - id: communications_mining_discovery
      label: Communications Mining (discovery)
  - id: automation
    label: Automation
    components:
    - id: rpa_unattended
      label: RPA — Unattended / VM Robot (BOR)
    - id: rpa_attended
      label: RPA — Attended (FOR)
    - id: integration_service
      label: Integration Service (API connectors)
    - id: maestro
      label: Maestro / Workflow Orchestration
    - id: agents
      label: Agents (Agentic / LLM-driven)
    - id: test_automation
      label: Test Automation (Test Suite)
  - id: cognitive_ai
    label: Cognitive / AI
    components:
    - id: document_understanding
      label: Document Understanding / IDP
    - id: ai_center
      label: AI Center (custom models)
    - id: communications_mining_runtime
      label: Communications Mining (runtime)
  - id: human_in_the_loop
