    pdd:
      role: volume only
    sdd:
      owns: true
      section: '3.5'
      required: true
      template: snippets/volume.md
  role:
    R: sa
    A: developer
  validated_by:
  concept:
    model:
      processing_window_min:
        type: integer
        description: Minutes per day within which the full daily volume must be cleared
      runtimes_standard:
        type: integer
        description: Runtimes required to process daily_volume within processing_window_min
      runtimes_peak:
        type: integer
        description: Runtimes required to process peak_volume within processing_window_min
      queue_sla:
        type: string
        required: false
        description: Agreed SLA for queue processing (e.g. all items processed within 4 h of submission)
      scalable:
        type: boolean
        description: Whether the solution supports multi-robot scale-out
- topic: Recommended runtime count
  semantics:
    kind: metric
  purpose:
    statement: State the minimum number of runtimes required to meet the SLA under peak conditions so infrastructure is 
      provisioned correctly.
  acquisition:
    modes:
    - estimate
    - interview
    estimate:
      instruction: SA calculates from peak daily volume, per-item processing time, and available window. runtime_count =
        ceil(peak_volume * avg_item_seconds / window_seconds).
    interview:
      question: Based on the utilisation analysis, how many runtimes are needed at standard and peak load, and what 
        threshold should trigger an auto-scaling event?
  concept:
    uses:
    - schedule
    model:
      recommended_runtime_count:
        type: list
        required: false
        item:
          scenario:
            type: string
          volume:
            type: string
          runtimes_required:
            type: string
          notes:
            type: string
      runtime_count:
        type: integer
        required: true
        description: Minimum runtimes to clear peak daily volume within the processing window
      peak_utilisation_pct:
        type: number
        derived: (peak_volume * avg_item_seconds) / (runtime_count * window_seconds) * 100
      scaling_trigger:
        type: string
        description: Condition that would require an additional runtime (e.g. volume exceeds X or window shrinks below Y
          minutes)
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: sdd
  artefacts:
    sdd:
      owns: true
      section: '3.6'
      role: scaling design
      required: true
      template: snippets/recommended_runtime_count.md
  role:
    R: sa
    A: pm
  validated_by:
- topic: Domain terminology
  semantics:
    kind: concept
  purpose:
    statement: Define project-specific terms and abbreviations so all stakeholders share a common vocabulary throughout 
      the project.
  acquisition:
    modes:
    - interview
    interview:
      question: What project-specific terms, abbreviations, and system names need a shared definition?
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: glossary
  artefacts:
    glossary:
      owns: true
      required: true
    pdd:
      role: source of terms
    sdd:
      role: source of terms
    tdd:
      role: source of terms
  role:
    R: ba
    A: process-owner
    C:
    - sa
  validated_by:
- topic: Coverage assessment
  semantics:
    kind: procedure
  purpose:
    statement: Evaluate which topics are covered, partially covered, or missing across all artefacts so gaps can be 
      addressed before sign-off.
  acquisition:
    modes:
    - interview
    interview:
      question: Which document covers which topic, and are there any uncovered gaps? (Run at any time — not bound to a 
        specific artefact stage.)
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
  artefacts:
    pdd:
      role: source topics
  role:
    R: sa
  validated_by:
- topic: Timeline / milestones
  semantics:
    kind: constraint
  purpose:
    statement: Establish delivery milestones so all teams can plan dependencies and stakeholders can track progress.
  acquisition:
    modes:
    - interview
    interview:
      question: What are the key delivery milestones — design complete, build complete, UAT start, go-live — and by 
        when?
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: project_plan
  artefacts:
    sdd:
      role: phases
    project_plan:
      owns: true
      required: true
      template: snippets/milestones.md
  role:
    R: pm
    A: sa
  validated_by:
  concept:
    model:
      milestones:
        type: list
        item:
          milestone:
            type: string
          target_date:
            type: string
            required: false
          responsible:
            type: string
            required: false
          status:
            type: string
            required: false
- topic: Domain data model
  semantics:
    kind: concept
  purpose:
    statement: Identify every input the process works with, where it comes from, and in what form.
  acquisition:
    modes:
    - interview
    - document
    interview:
      question: 'What inputs does this process work with? For each: name it as the business calls it, identify which steps
        use it, which system it comes from, in what format it arrives (document, database record, API response, screen data,
        file, or queue item), where exactly within that system, and whether the data is structured (fixed fields) or unstructured
        (free text, scanned image, PDF without embedded fields).'
  concept:
    model:
      entities:
        type: list
        item:
          id:
            type: string
            required: false
          name:
            type: string
          steps:
            type: string
            required: false
          source:
            type: object
            item:
              application:
                type: string
                required: false
              input_type:
                type: string
              location:
                type: string
                required: false
          target:
            type: object
            required: false
          structured:
            type: boolean
            required: false
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown:
  artefacts:
    pdd:
      role: consumes — limited rendering
      section: '2.6'
      template: snippets/process_data.md
      validated_by:
    sdd:
      role: consumes — detailed technical rendering
    tdd:
      role: consumes — implementation contracts
  role:
    R: sa
    A: developer
  validated_by:
- topic: Data flow and field mapping
  semantics:
    kind: concept
  purpose:
    statement: Map source fields to target fields for every system integration so transformations are unambiguous and 
      testable.
  acquisition:
    modes:
    - interview
    interview:
      question: Which source field maps to which target field for each system integration? What transformations or 
        parsing steps are required?
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
  artefacts:
    tdd:
      role: implements mappings
    sdd:
      role: integration overview
  role:
    R: developer
    A: sa
  validated_by:
- topic: Observations and findings
  semantics:
    kind: constraint
  purpose:
    statement: Single unified list of observations, improvements, removals, and open issues across all artefacts, 
      filtered by kind into the appropriate document sections.
  acquisition:
    modes:
    - interview
    interview:
      question: Are there discovery observations (PDD), future improvements or items removed from scope (SDD), or open 
        technical issues and blockers (TDD)?
  concept:
    model:
      observations:
        type: list
        item:
          id:
            type: string
            required: false
            description: Stable trace ID — auto-assigned by parser (obs_xxxxxx). Manual override allowed.
          kind:
            type: string
            enum: observation_kind
          title:
            type: string
          description:
            type: string
            required: false
          category:
            type: string
            required: false
          impact:
            type: string
            required: false
          owner:
            type: string
            required: false
          status:
            type: string
            enum: observation_status
            required: false
  transforms:
    to_markdown: scripts/cpm_rpa/renderer.py
    from_markdown: scripts/cpm_rpa/parser.py
    parse_from: pdd
  artefacts:
    pdd:
      owns: true
      required: false
      role: discovery observations (kind=observation)
      section: '4'
      template: snippets/observations_discovery.md
    sdd:
      owns: true
      required: false
      role: future improvements + removed items (kind=improvement|removal)
      section: '10'
      template:
      - snippets/observations_improvement.md
      - snippets/observations_removal.md
    tdd:
      owns: true
      required: false
      role: open technical issues and blockers (kind=issue)
      template: snippets/observations_issues.md
  role:
    R: sa
    A: ba
    C:
    - developer
  validated_by:
shared:
- name: project_identity
  description: 'Process-level identity fields that appear in PDD section 2.1, SDD section 2.2, TDD section 1.1, and the arch
    chapter header. Parsed from 2-column flipped tables and merged into the root project-data namespace. Fields that overlap
    with project.json (studio_version, expression_language, target_framework) are auto-populated by the renderer from project.json
    when --project is supplied.

