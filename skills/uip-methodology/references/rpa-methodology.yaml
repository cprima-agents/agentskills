- name: process_configuration
  description: 'CodedConfig schema — typed C# configuration generated by ConFormMold from per-environment config files (TOML
    or xlsx). Populated automatically by the renderer when --config-dev / --config-test / --config-prod are supplied. Authored
    in TDD section 1.4.

