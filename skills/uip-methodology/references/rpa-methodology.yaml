    description: RPA process invoked synchronously as a tool by an agent or orchestration flow. No queue boundary.
  - id: rpa_dispatcher
    label: RPA Dispatcher
    runtime_type: Process
    description: Queries source system and enqueues items into an Orchestrator queue. Linear framework.
